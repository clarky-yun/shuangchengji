<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>双城记</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="lock-screen" id="lockScreen" hidden>
      <form class="lock-card" id="unlockForm">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M12 21s-7.2-4.4-9.2-9.2C1.3 8.2 3.5 4.5 7.1 4.5c2 0 3.4 1 4.1 2.1.7-1.1 2.1-2.1 4.1-2.1 3.6 0 5.8 3.7 4.3 7.3C17.6 16.6 12 21 12 21Z" />
          </svg>
        </div>
        <p class="eyebrow">private space</p>
        <h1>双城记</h1>
        <img class="lock-cat" src="./assets/city-cat.svg" alt="双城记原创白猫插画" />
        <div class="form-row">
          <label for="unlockCode">访问密码</label>
          <input id="unlockCode" name="unlockCode" type="password" autocomplete="current-password" required />
        </div>
        <button class="button" type="submit">进入</button>
      </form>
    </div>

    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M12 21s-7.2-4.4-9.2-9.2C1.3 8.2 3.5 4.5 7.1 4.5c2 0 3.4 1 4.1 2.1.7-1.1 2.1-2.1 4.1-2.1 3.6 0 5.8 3.7 4.3 7.3C17.6 16.6 12 21 12 21Z" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">private space</p>
            <h1>双城记</h1>
          </div>
        </div>

        <nav class="nav-list" id="navList"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="todayLabel"></p>
            <h2 id="pageTitle">首页</h2>
          </div>
          <button class="icon-button" id="quickSettings" type="button" aria-label="打开设置">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
              <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 4.6a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1Z" />
            </svg>
          </button>
        </header>

        <section class="view is-active" id="view-home" aria-label="首页"></section>
        <section class="view" id="view-messages" aria-label="留言"></section>
        <section class="view" id="view-daily" aria-label="日常"></section>
        <section class="view" id="view-wishes" aria-label="心愿"></section>
        <section class="view" id="view-memories" aria-label="回忆"></section>
        <section class="view" id="view-settings" aria-label="设置"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
